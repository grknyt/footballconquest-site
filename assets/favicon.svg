<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- v-green rebrand: black FC on green, matching the mobile app launcher
       icon so the browser tab and the installed app share one identity. -->
  <defs>
    <linearGradient id="fcbg" x1="0" y1="0" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#01ff01"/>
      <stop offset="1" stop-color="#30ff61"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="4" fill="url(#fcbg)"/>
  <text x="16" y="23" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="19" font-weight="bold" fill="#050a12">FC</text>
</svg>
