<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- globe-rebrand favicon: white tile + green FC, matching the app icon's
       light background. Globe detail is too fine at 16px, so the favicon uses
       the simple FC lockup in the new brand green. -->
  <rect width="32" height="32" rx="5" fill="#ffffff"/>
  <rect x="1.2" y="1.2" width="29.6" height="29.6" rx="4.2" fill="none" stroke="#254c3e" stroke-width="1.4"/>
  <text x="16" y="23" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="18" font-weight="bold" fill="#007546">FC</text>
</svg>
